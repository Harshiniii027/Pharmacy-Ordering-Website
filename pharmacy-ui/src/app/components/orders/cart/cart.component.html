<div class="container mt-5">
  <div class="row">
    <div class="col-12">
      <h2 class="mb-4">
        <i class="fas fa-shopping-cart me-2"></i>Your Shopping Cart
      </h2>
      
      <div *ngIf="cartItems.length === 0" class="text-center py-5">
        <i class="fas fa-shopping-basket fa-4x text-muted mb-3"></i>
        <h4>Your cart is empty</h4>
        <p class="text-muted">Add some medicines to your cart and they will appear here</p>
        <button class="btn btn-primary" (click)="continueShopping()">
          <i class="fas fa-shopping me-2"></i>Continue Shopping
        </button>
      </div>
      
      <div *ngIf="cartItems.length > 0">
        <div class="table-responsive">
          <table class="table table-hover">
            <thead class="table-light">
              <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of cartItems">
                <td>
                  <div class="d-flex align-items-center">
                    <div>
                      <h6 class="mb-0">{{item.name}}</h6>
                      <small class="text-muted" *ngIf="item.requiresPrescription">
                        <i class="fas fa-prescription-bottle me-1"></i>Prescription Required
                      </small>
                    </div>
                  </div>
                </td>
                <td>₹{{item.price}}</td>
                <td>
                  <div class="input-group" style="width: 120px;">
                    <button class="btn btn-outline-secondary btn-sm" 
                            (click)="updateQuantity(item, item.quantity - 1)">
                      -
                    </button>
                    <input type="text" class="form-control form-control-sm text-center" 
                           [value]="item.quantity" readonly>
                    <button class="btn btn-outline-secondary btn-sm" 
                            (click)="updateQuantity(item, item.quantity + 1)"
                            [disabled]="item.quantity >= item.stockQuantity">
                      +
                    </button>
                  </div>
                </td>
                <td>₹{{item.price * item.quantity}}</td>
                <td>
                  <button class="btn btn-danger btn-sm" (click)="removeItem(item.id)">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
            </tbody>
            <tfoot class="table-light">
              <tr>
                <td colspan="3" class="text-end fw-bold">Total:</td>
                <td colspan="2" class="fw-bold fs-5 text-primary">₹{{totalAmount}}</td>
               </tr>
            </tfoot>
          </table>
        </div>
        
        <div class="d-flex justify-content-between mt-4">
          <button class="btn btn-outline-secondary" (click)="clearCart()">
            <i class="fas fa-trash-alt me-2"></i>Clear Cart
          </button>
          <div>
            <button class="btn btn-outline-primary me-2" (click)="continueShopping()">
              <i class="fas fa-arrow-left me-2"></i>Continue Shopping
            </button>
            <button class="btn btn-success" (click)="proceedToCheckout()">
              Proceed to Checkout <i class="fas fa-arrow-right ms-2"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
