<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="text-success mb-3">Checkout</h3>

    <div class="mb-3">
      <label class="form-label">Prescription ID (if required)</label>
      <input type="number" class="form-control" [(ngModel)]="prescriptionId">
    </div>

    <button class="btn btn-primary w-100" (click)="placeOrder()">
      Place Order
    </button>
  </div>
</div>
