<div class="container mt-4">
  <h2><i class="fas fa-shopping-cart me-2"></i>Order Management</h2>
  
  <div class="card shadow mt-3">
    <div class="card-body">
      <div *ngIf="loading" class="text-center py-4">
        <div class="spinner-border text-primary"></div>
      </div>
      
      <div *ngIf="!loading && orders.length === 0" class="alert alert-info">
        No orders available
      </div>
      
      <div *ngFor="let order of orders" class="card mb-3">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
          <div>
            <strong>Order #{{order.id}}</strong>
            <small class="text-muted ms-3">{{order.orderDate | date:'medium'}}</small>
          </div>
          <span class="badge" [class.bg-warning]="order.status === 'Pending'"
                [class.bg-info]="order.status === 'Processing'"
                [class.bg-success]="order.status === 'Delivered'"
                [class.bg-danger]="order.status === 'Cancelled'">
            {{order.status}}
          </span>
        </div>
        <div class="card-body">
          <p><strong>User ID:</strong> {{order.userId}}</p>
          <p><strong>Total Amount:</strong> ₹{{order.totalAmount}}</p>
          
          <hr>
          <h6>Items:</h6>
          <ul>
            <li *ngFor="let item of order.orderItems">
              {{item.name || item.medicineName}} - Qty: {{item.quantity}} - ₹{{item.price}}
            </li>
          </ul>
          
          <div class="mt-3">
            <button class="btn btn-sm btn-warning me-2" 
                    (click)="updateStatus(order.id, 'Processing')"
                    [disabled]="order.status !== 'Pending'">
              Processing
            </button>
            <button class="btn btn-sm btn-success me-2" 
                    (click)="updateStatus(order.id, 'Delivered')"
                    [disabled]="order.status !== 'Processing'">
              Delivered
            </button>
            <button class="btn btn-sm btn-danger" 
                    (click)="updateStatus(order.id, 'Cancelled')"
                    [disabled]="order.status === 'Delivered' || order.status === 'Cancelled'">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
