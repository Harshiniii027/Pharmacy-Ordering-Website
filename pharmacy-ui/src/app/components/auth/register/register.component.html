<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-success text-white text-center py-3">
          <h3 class="mb-0">📝 Register</h3>
        </div>
        <div class="card-body p-4">
          <div *ngIf="successMessage" class="alert alert-success">
            {{ successMessage }}
          </div>
          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>
          
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" [(ngModel)]="registerData.fullName" name="fullName" required>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" [(ngModel)]="registerData.email" name="email" required>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" [(ngModel)]="registerData.password" name="password" required>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-control" [(ngModel)]="registerData.phone" name="phone" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100" [disabled]="loading">
              {{ loading ? 'Registering...' : 'Register' }}
            </button>
          </form>
          
          <div class="mt-3 text-center">
            <a routerLink="/login">Already have an account? Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
