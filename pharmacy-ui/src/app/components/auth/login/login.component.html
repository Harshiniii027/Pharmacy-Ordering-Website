<div class="auth-container">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">
          <i class="fas fa-lock"></i>
        </div>
        <h2>Welcome Back!</h2>
        <p>Login to your PharmaCare account</p>
      </div>
      
      <div *ngIf="errorMessage" class="alert alert-danger">
        <i class="fas fa-exclamation-circle me-2"></i>{{ errorMessage }}
      </div>
      
      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label>
            <i class="fas fa-envelope"></i>
            <span>Email Address</span>
          </label>
          <input type="email" class="form-control" [(ngModel)]="loginData.email" name="email" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label>
            <i class="fas fa-key"></i>
            <span>Password</span>
          </label>
          <input type="password" class="form-control" [(ngModel)]="loginData.password" name="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn-submit" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <i class="fas fa-sign-in-alt me-2" *ngIf="!loading"></i>
          {{ loading ? 'Logging in...' : 'Login' }}
        </button>
      </form>
      
      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/register">Register here</a></p>
      </div>
    </div>
  </div>
</div>
